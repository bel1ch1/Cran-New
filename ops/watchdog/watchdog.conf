# Example watchdog configuration for CRAN docker stack.
# Copy to /etc/watchdog.conf (or merge with your existing file).

watchdog-device = /dev/watchdog
watchdog-timeout = 15
interval = 5
realtime = yes
priority = 1

# If this script returns non-zero MAX_FAILS times in a row,
# watchdog daemon stops petting /dev/watchdog and hardware reboots host.
test-binary = /opt/cran/watchdog/docker_health_guard.sh

# Optional basic host-level checks.
max-load-1 = 24
min-memory = 1
